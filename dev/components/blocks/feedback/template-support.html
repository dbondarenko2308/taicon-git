<div class="feedback feedback-support">
  <div class="container">
    <div class="feedback__inner">
      <div class="feedback__img">
        <img src="images/feedback.png" alt="" />
      </div>
      <form action="#">
        <div class="form-content">
          <h3 class="form-content__title title">
            Написать в техническую поддержку
          </h3>

          <div class="form-content__top">
            <div class="form-content__info">
              <div class="feedback-contacts__left">
                <label class="field field-select" data-field="Тема запроса">
                  <select class="select2">
                    <option value="" disabled selected hidden>
                      Тема запроса*
                    </option>
                    <option value="AL">Белгородская область</option>
                    <option value="AL">Брянская область</option>
                    <option value="AL">Белгородская область</option>
                  </select>
                </label>
                <label class="field">
                  <input type="text" />
                  <span class="field__label">ФИО*</span>
                </label>

                <label class="field">
                  <input type="text" />
                  <span class="field__label">Email*</span>
                </label>
                <div class="form-group">
                  <input
                    id="phone"
                    type="tel"
                    name="leyka_donor_phone"
                    class="form-control tel"
                    inputmode="tel"
                    value=""
                  />
                </div>
                <label class="field field--textarea">
                  <textarea></textarea>
                  <span class="field__label">Сообщение</span>
                </label>
              </div>

              <div class="feedback-contacts__right">
                <div class="file">
                  <input type="file" class="file__input" hidden />

                  <div class="file__body">
                    <div class="file__text">
                      <p><span> Загрузите файл</span><b>формата</b></p>
                      <p>jpeg, png, docx, xlsx, pdf, не более 5 МБ</p>
                    </div>

                    <button type="button" class="file__btn">ЗАГРУЗИТЬ</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-content__bot">
              <div class="captcha captcha-right field--error">
                <img src="images/captcha.png" alt="" />
              </div>
              <div class="form-content__foot">
                <label class="checkbox">
                  <span class="checkbox__inner">
                    <input type="checkbox" checked />
                    <span></span>
                  </span>
                  <span class="checkbox__text"
                    >Нажимая кнопку, я принимаю
                    <a href="#">условия соглашения</a>
                  </span>
                </label>

                <a
                  href="#thanks"
                  data-fancybox
                  class="form-content__btn btn btn-dark"
                >
                  Отправить
                </a>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
